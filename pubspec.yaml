name: nastools
description: 个人 NAS 工具箱 - Android 优先的 Flutter 模块化工具集合
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Code generation models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24

  # Network
  dio: ^5.7.0
  xml: ^6.5.0

  # Routing
  go_router: ^14.2.7

  # Platform / permissions
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^8.1.3

  # Preview / external apps
  photo_view: ^0.15.0
  open_filex: ^4.5.0
  mime: ^1.0.6

  # Utils
  crypto: ^3.0.5
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.18.0
  meta: ^1.15.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  drift_dev: ^2.18.0
  json_serializable: ^6.8.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.13

dependency_overrides:
  # custom_lint_core 0.7.1 pins analyzer_plugin ^0.12.0, but 0.12.0 was
  # written against analyzer 6.x Element API and breaks under analyzer 7.4+
  # (Element → Element2 transition). 0.13.4 is the last release in the 7.x
  # line and uses Element2 throughout. Drop this override once custom_lint
  # ships a fix on the 0.7.x line, or when we migrate to riverpod 3.x.
  analyzer_plugin: ^0.13.0

flutter:
  uses-material-design: true
